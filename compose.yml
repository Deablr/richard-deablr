# Richard Deablr Minecraft Server
# Deployed via Dokploy on Hostinger VPS

services:
  mc:
    image: itzg/minecraft-server:latest
    container_name: richard-deablr-mc
    tty: true
    stdin_open: true
    restart: unless-stopped
    # No host port binding; mc-router handles external routing on 25565
    networks:
      - deabcraft
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "26.1.2"
      MEMORY: "2048M"
      MOTD: "A server for Richard"
      ICON: "/server-icon.png"
      FORCE_GAMEMODE: "true"
      ENABLE_COMMAND_BLOCK: "true"
      ALLOW_NETHER: "false"
      SPAWN_ANIMALS: "false"
      SPAWN_MONSTERS: "false"
      SPAWN_NPCS: "false"
      LEVEL_TYPE: "flat"
      GENERATE_STRUCTURES: "false"
      SPAWN_PROTECTION: "0"
      OPS: |-
        3fa30a96-7f21-40fc-8f93-43bc73ce8db2
        c1c43a34-eea1-44a6-8676-7f08b942939a
      ENABLE_WHITELIST: "true"
      WHITELIST: |-
        3fa30a96-7f21-40fc-8f93-43bc73ce8db2
        c1c43a34-eea1-44a6-8676-7f08b942939a
      PLUGINS: |-
        https://hangarcdn.papermc.io/plugins/EngineHub/WorldEdit/versions/7.4.2/PAPER/worldedit-bukkit-7.4.2.jar
      HIDE_ONLINE_PLAYERS: "true"
      ENFORCE_SECURE_PROFILE: "false"
      SERVER_NAME: "Richard Deablr Server"
    volumes:
      - "/opt/richard-deablr/data:/data"
      - "./server-icon.png:/server-icon.png:ro"

networks:
  deabcraft:
    external: true
